<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts Related -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md mx-auto bg-base-200">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-3">
          <div class="logo w-[60px]">
            <img src="assets/logo.png" alt="Payoo logo" />
          </div>
          <div class="balance-info">
            <h2 class="font-bold text-2xl">$ <span id="balance">45000</span></h2>
            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>
        <div class="right">
          <a href="index.html" class="btn btn-soft text-neutral/50"
            ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
          >
        </div>
      </section>
    </header>

    <section class="mx-auto w-11/12 py-10 space-y-3">
        <h1 class="font-bold text-3xl">
          Welcome to Pay<span class="text-primary">oo</span>
        </h1>
        <p class="text-neutral/50">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      


      <div class="buttons grid grid-cols-3 gap-3 pt-6">
        <button class="btn btn-primary flex flex-col h-full py-4 btn-soft">
          <img src="assets/opt-1.png" alt="" />
          Add Money
        </button>
        <button class="btn btn-primary flex flex-col h-full py-4 btn-soft">
          <img src="assets/opt-2.png" alt="" />
          Cashout
        </button>
        <button class="btn btn-primary flex flex-col h-full py-4 btn-soft">
          <img src="assets/opt-3.png" alt="" />
          Send Money
        </button>
        <button class="btn btn-primary flex flex-col h-full py-4 btn-soft">
          <img src="assets/opt-4.png" alt="" />
          Get Bonus
        </button>
        <button class="btn btn-primary flex flex-col h-full py-4 btn-soft">
          <img src="assets/opt-5.png" alt="" />
          Pay Bill
        </button>
        <button class="btn btn-primary flex flex-col h-full py-4 btn-soft">
          <img src="assets/opt-6.png" alt="" />
          Transactions
        </button>
      </div>
    </section>


    <section class="cashout w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold pb-3">Cashout</h2>
         <div
        class="card bg-base-100 w-full shadow mx-auto rounded-3xl"
      >
        <div class="card-body">
          <fieldset class="fieldset space-y-2">
            <label class="label text-neutral font-bold">Agent Number</label>
            <input
              id="cashout-number"
              maxlength="11"
              minlength="11"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter 11 digit number"
              value="01234567890"
            />

            <label class="label text-neutral font-bold">Amount</label>
            <input
              id="cashout-amount"
              type="number"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter amount to withdraw"
            />

            <label class="label text-neutral font-bold">Pin  Number</label>
            <input
            id="cashout-pin"
              maxlength="4"
              
              type="password"
              class="input rounded-full bg-base-200 w-full"
              placeholder="ENter 4 digit pin number"
            />
            <div></div>
            <button id="cashout-btn" class="btn btn-primary rounded-full mt-4">
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>


    </section>

    <script src="script/machine.js"></script>
    <script src="script/cashout.js"></script>
  </body>
</html>
